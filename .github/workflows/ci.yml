name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting deps
        run: pip install ruff==0.7.2 black==24.10.0

      - name: Run ruff
        run: ruff check .

      - name: Check black formatting
        run: black --check .

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=core --cov=agents --cov=database --cov-report=term-missing
        env:
          # Unit tests use mocks — no real API keys needed
          OPENAI_API_KEY: sk-test-dummy
          FIRECRAWL_API_KEY: fc-test-dummy
          TAVILY_API_KEY: tvly-test-dummy

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=60
        env:
          OPENAI_API_KEY: sk-test-dummy
          FIRECRAWL_API_KEY: fc-test-dummy
          TAVILY_API_KEY: tvly-test-dummy

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t saas-research-platform:test .

      - name: Verify entrypoint exists
        run: docker run --rm saas-research-platform:test --help
        env:
          OPENAI_API_KEY: sk-test
          FIRECRAWL_API_KEY: fc-test
          TAVILY_API_KEY: tvly-test
