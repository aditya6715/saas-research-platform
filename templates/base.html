<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Integration Research — Composio</title>

  <!-- Tailwind CSS (CDN play build — no build step required) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Mermaid.js -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 3px; }

    /* Fade-in animation */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.35s ease both; }

    /* Confidence bar */
    .conf-bar { transition: width 0.6s cubic-bezier(.4,0,.2,1); }

    /* Mermaid diagram dark/light */
    .mermaid svg { max-width: 100%; height: auto; }

    /* Table row hover */
    .app-row { cursor: pointer; transition: background 0.15s; }

    /* Detail panel */
    .detail-panel { transition: max-height 0.35s cubic-bezier(.4,0,.2,1), opacity 0.25s; overflow: hidden; }
    .detail-panel.closed { max-height: 0; opacity: 0; }
    .detail-panel.open { max-height: 9999px; opacity: 1; }
  </style>
</head>

<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-200">

  <!-- Dark mode init (before render to avoid flash) -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- ── Sticky Header ─────────────────────────────────────────────── -->
  <header class="sticky top-0 z-50 bg-white/90 dark:bg-gray-950/90 backdrop-blur border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-brand-500 font-bold text-lg tracking-tight">⬡ Composio</span>
        <span class="hidden sm:inline text-gray-400 dark:text-gray-500 text-sm">/ SaaS Research Platform</span>
      </div>
      <nav class="hidden md:flex items-center gap-6 text-sm text-gray-600 dark:text-gray-400">
        <a href="#summary" class="hover:text-brand-500 transition-colors">Summary</a>
        <a href="#charts" class="hover:text-brand-500 transition-colors">Charts</a>
        <a href="#insights" class="hover:text-brand-500 transition-colors">Insights</a>
        <a href="#table" class="hover:text-brand-500 transition-colors">Data</a>
        <a href="#verification" class="hover:text-brand-500 transition-colors">Verification</a>
        <a href="#architecture" class="hover:text-brand-500 transition-colors">Architecture</a>
      </nav>
      <button
        id="themeToggle"
        onclick="toggleTheme()"
        class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
        aria-label="Toggle dark mode"
      >
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ── Page Content ───────────────────────────────────────────────── -->
  <main class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ────────────────────────────────────────────────────── -->
  <footer class="border-t border-gray-200 dark:border-gray-800 mt-16">
    <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-500 dark:text-gray-500">
      <p>Generated by <strong class="text-gray-700 dark:text-gray-300">Autonomous SaaS Research Platform</strong> · {{ generated_at }}</p>
      <p>Session <code class="font-mono text-xs bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded">{{ session_id[:8] }}</code></p>
    </div>
  </footer>

  <!-- ── Global Scripts ─────────────────────────────────────────────── -->
  <script>
    // ── Dark mode toggle ──────────────────────────────────────────────
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
    }
    // Set correct icon on load
    document.getElementById('themeIcon').textContent =
      document.documentElement.classList.contains('dark') ? '☀️' : '🌙';

    // ── Mermaid init ──────────────────────────────────────────────────
    mermaid.initialize({
      startOnLoad: true,
      theme: document.documentElement.classList.contains('dark') ? 'dark' : 'default',
      securityLevel: 'loose',
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
