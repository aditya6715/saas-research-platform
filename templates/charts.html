<section id="charts" style="padding-bottom:2.5rem;" class="fade-in">
  <h2>Distribution Analysis</h2>
  <div class="charts-grid">
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Authentication Methods</h3>
      <div style="position:relative;height:200px;"><canvas id="chartAuth"></canvas></div>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">API Surface Types</h3>
      <div style="position:relative;height:200px;"><canvas id="chartAPI"></canvas></div>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Access Model</h3>
      <div style="position:relative;height:200px;"><canvas id="chartAccess"></canvas></div>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Buildability Verdict</h3>
      <div style="position:relative;height:200px;"><canvas id="chartBuild"></canvas></div>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">MCP Support Status</h3>
      <div style="position:relative;height:200px;"><canvas id="chartMCP"></canvas></div>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Top Blockers</h3>
      <div style="position:relative;height:200px;"><canvas id="chartBlockers"></canvas></div>
    </div>
  </div>
</section>
