<section id="charts" style="padding-bottom:2.5rem;" class="fade-in">
  <h2>Distribution Analysis</h2>
  <div class="charts-grid">
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Authentication Methods</h3>
      <canvas id="chartAuth"></canvas>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">API Surface Types</h3>
      <canvas id="chartAPI"></canvas>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Access Model</h3>
      <canvas id="chartAccess"></canvas>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Buildability Verdict</h3>
      <canvas id="chartBuild"></canvas>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">MCP Support Status</h3>
      <canvas id="chartMCP"></canvas>
    </div>
    <div class="chart-card">
      <h3 style="margin-bottom:1rem;">Top Blockers</h3>
      <canvas id="chartBlockers"></canvas>
    </div>
  </div>
</section>

<script>
(function(){
  var dark = document.body.classList.contains('dark');
  var txt  = dark ? '#9ca3af' : '#6b7280';
  var grid = dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)';

  var doughnut = function(id, data){
    new Chart(document.getElementById(id),{
      type:'doughnut', data:data,
      options:{responsive:true, maintainAspectRatio:true, cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{color:txt,font:{size:10},boxWidth:10,padding:8}},
                 tooltip:{callbacks:{label:function(c){return ' '+c.label+': '+c.raw;}}}}}
    });
  };
  var bar = function(id, data, horiz){
    new Chart(document.getElementById(id),{
      type:'bar', data:data,
      options:{indexAxis:horiz?'y':'x', responsive:true, maintainAspectRatio:true,
        plugins:{legend:{display:false}},
        scales:{
          x:{ticks:{color:txt,font:{size:10}},grid:{color:grid}},
          y:{ticks:{color:txt,font:{size:10}},grid:{color:grid}}
        }}
    });
  };

  doughnut('chartAuth',   CHART_DATA.auth);
  bar('chartAPI',         CHART_DATA.api_surface, false);
  doughnut('chartAccess', CHART_DATA.access_model);
  doughnut('chartBuild',  CHART_DATA.buildability);
  doughnut('chartMCP',    CHART_DATA.mcp_support);

  var bl = STATS.top_blockers||[];
  bar('chartBlockers',{
    labels: bl.map(function(b){return b.blocker;}),
    datasets:[{label:'Count',data:bl.map(function(b){return b.count;}),
               backgroundColor:'#6366f1',borderRadius:4}]
  }, true);
})();
</script>
