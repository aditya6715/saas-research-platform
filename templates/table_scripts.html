<script>
var filteredApps = APP_DATA.slice();
var sortKey = 'app_name', sortAsc = true, openId = null;

(function init(){
  var cats = [...new Set(APP_DATA.map(function(a){return a.category;}).filter(Boolean))].sort();
  var sel = document.getElementById('filterCategory');
  cats.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  renderTable(APP_DATA);
  restoreHash();
})();

function vbadge(v){
  if(!v) return '<span style="color:#9ca3af;font-size:.75rem;">—</span>';
  var cls = v==='Fully Buildable'?'badge-green':v==='Buildable with Workarounds'?'badge-amber':'badge-red';
  var ic  = v==='Fully Buildable'?'✅':v==='Buildable with Workarounds'?'⚠️':'🚫';
  return '<span class="badge '+cls+'">'+ic+' '+v+'</span>';
}
function mcpBadge(m){
  var ic = {Official:'🔵',Community:'👥','In-Progress':'🔄',None:'—'}[m]||'—';
  return '<span style="font-size:.75rem;">'+ic+' '+(m||'—')+'</span>';
}
function confBadge(c){
  if(c==null) return '—';
  var pct=Math.round(c*100);
  var cls = pct>=90?'conf-high':pct>=70?'conf-mid':'conf-low';
  return '<span class="'+cls+'">'+pct+'%</span>';
}

function renderTable(apps){
  var tbody = document.getElementById('appTableBody');
  var noRes = document.getElementById('noResults');
  document.getElementById('resultCount').textContent = apps.length;
  if(!apps.length){ tbody.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display='none';
  tbody.innerHTML = apps.map(function(a){
    return rowHtml(a)+detailHtml(a);
  }).join('');
}

function rowHtml(a){
  var flags = (a.human_review_required ? '<span title="Needs review" style="color:#f59e0b;font-size:.7rem;">⚑ </span>':'')+
              (a.human_reviewed_by ? '<span title="Human verified" style="color:#16a34a;font-size:.7rem;">✓ </span>':'');
  return '<tr class="app-row" onclick="toggleDetail(\''+a.id+'\')" data-id="'+a.id+'">'+
    '<td><div class="td-name">'+flags+(a.app_name||'')+'</div><div class="td-desc">'+(a.description||'')+'</div></td>'+
    '<td class="hide-sm" style="font-size:.75rem;color:#6b7280;">'+(a.category||'—')+'</td>'+
    '<td style="font-size:.75rem;">'+(a.primary_auth||'—')+'</td>'+
    '<td class="hide-md" style="font-size:.75rem;color:#6b7280;">'+(a.api_types_str||'—')+'</td>'+
    '<td>'+vbadge(a.buildability_verdict)+'</td>'+
    '<td>'+confBadge(a.confidence_score)+'</td>'+
    '<td class="hide-lg">'+mcpBadge(a.mcp_support)+'</td>'+
    '<td style="font-size:.75rem;color:#6b7280;">'+(a.access_model||'—')+'</td>'+
    '</tr>';
}

function detailHtml(a){
  var ev = {};
  (a.evidence||[]).forEach(function(e){ if(!ev[e.field_name]) ev[e.field_name]=[]; ev[e.field_name].push(e); });
  var flds = [
    ['auth_methods','Auth Methods',a.auth_methods_str],['primary_auth','Primary Auth',a.primary_auth],
    ['api_types','API Types',a.api_types_str],['access_model','Access Model',a.access_model],
    ['base_api_url','Base API URL',a.base_api_url],['mcp_support','MCP Support',a.mcp_support],
    ['mcp_repo_url','MCP Repo',a.mcp_repo_url],['biggest_blocker','Biggest Blocker',a.biggest_blocker],
    ['documentation_url','Docs URL',a.documentation_url],['rate_limits','Rate Limits',a.rate_limits],
    ['api_versioning','Versioning',a.api_versioning],['pricing_tier_for_api','Pricing Tier',a.pricing_tier_for_api],
  ].filter(function(f){ return f[2]; });

  var html = '<tr id="detail-'+a.id+'" class="detail-row" style="display:none;"><td colspan="8"><div class="detail-panel closed"><div class="detail-inner"><div class="detail-grid">';
  flds.forEach(function(f){
    var evArr = ev[f[0]]||[];
    html += '<div class="detail-field"><label>'+f[1]+'</label><div class="val">'+escHtml(f[2]||'—')+'</div>';
    evArr.slice(0,1).forEach(function(e){
      html += '<a class="ev-link" href="'+e.source_url+'" target="_blank" rel="noopener">'+escHtml(e.source_url)+'</a>';
      if(e.extracted_text) html += '<div class="ev-quote">"'+escHtml(e.extracted_text.slice(0,120))+'"</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  if(a.human_reviewed_by) html += '<div class="human-badge">✓ Human verified by <strong style="margin-left:.2rem;">'+escHtml(a.human_reviewed_by)+'</strong></div>';
  if(a.human_review_required) html += '<div class="review-badge">⚑ Flagged for human review — confidence below threshold</div>';
  html += '</div></div></td></tr>';
  return html;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleDetail(id){
  if(openId===id){ closeDetail(id); openId=null; return; }
  if(openId) closeDetail(openId);
  openDetail(id); openId=id;
}
function openDetail(id){
  var r=document.getElementById('detail-'+id); if(!r) return;
  r.style.display='table-row';
  requestAnimationFrame(function(){ var p=r.querySelector('.detail-panel'); p.classList.remove('closed'); p.classList.add('open'); });
}
function closeDetail(id){
  var r=document.getElementById('detail-'+id); if(!r) return;
  var p=r.querySelector('.detail-panel'); p.classList.remove('open'); p.classList.add('closed');
  setTimeout(function(){ r.style.display='none'; }, 320);
}

function filterTable(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var cat=document.getElementById('filterCategory').value;
  var verd=document.getElementById('filterVerdict').value;
  var acc=document.getElementById('filterAccess').value;
  var mcp=document.getElementById('filterMCP').value;
  filteredApps = APP_DATA.filter(function(a){
    var mq=!q||[a.app_name,a.category,a.primary_auth,a.description].some(function(v){return v&&v.toLowerCase().includes(q);});
    return mq && (!cat||a.category===cat) && (!verd||a.buildability_verdict===verd) &&
           (!acc||a.access_model===acc) && (!mcp||a.mcp_support===mcp);
  });
  sortApps(); renderTable(filteredApps); updateHash();
}
function sortTable(k){ if(sortKey===k) sortAsc=!sortAsc; else {sortKey=k;sortAsc=true;} sortApps(); renderTable(filteredApps); }
function sortApps(){
  filteredApps.sort(function(a,b){
    var va=a[sortKey]||'', vb=b[sortKey]||'';
    if(typeof va==='number') return sortAsc?va-vb:vb-va;
    return sortAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
  });
}
function resetFilters(){
  document.getElementById('searchInput').value='';
  ['filterCategory','filterVerdict','filterAccess','filterMCP'].forEach(function(id){ document.getElementById(id).value=''; });
  filterTable();
}
function updateHash(){
  var p=new URLSearchParams();
  var q=document.getElementById('searchInput').value;
  var c=document.getElementById('filterCategory').value;
  var v=document.getElementById('filterVerdict').value;
  var a=document.getElementById('filterAccess').value;
  var m=document.getElementById('filterMCP').value;
  if(q) p.set('q',q); if(c) p.set('cat',c); if(v) p.set('verdict',v); if(a) p.set('access',a); if(m) p.set('mcp',m);
  history.replaceState(null,'',p.toString()?'#'+p.toString():location.pathname);
}
function restoreHash(){
  var h=location.hash.slice(1); if(!h) return;
  var p=new URLSearchParams(h);
  if(p.get('q')) document.getElementById('searchInput').value=p.get('q');
  if(p.get('cat')) document.getElementById('filterCategory').value=p.get('cat');
  if(p.get('verdict')) document.getElementById('filterVerdict').value=p.get('verdict');
  if(p.get('access')) document.getElementById('filterAccess').value=p.get('access');
  if(p.get('mcp')) document.getElementById('filterMCP').value=p.get('mcp');
  filterTable();
}
</script>
