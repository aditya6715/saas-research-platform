<section id="table" style="padding-bottom:2.5rem;" class="fade-in">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
    <h2 style="margin-bottom:0;">Research Data</h2>
    <span style="font-size:.8rem;color:#9ca3af;"><span id="resultCount">{{ total_apps }}</span> apps</span>
  </div>

  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="search" placeholder="Search apps, categories, auth..." oninput="filterTable()" aria-label="Search" />
    </div>
    <select id="filterCategory" onchange="filterTable()">
      <option value="">All Categories</option>
    </select>
    <select id="filterVerdict" onchange="filterTable()">
      <option value="">All Verdicts</option>
      <option value="Fully Buildable">✅ Fully Buildable</option>
      <option value="Buildable with Workarounds">⚠️ Workarounds</option>
      <option value="Blocked">🚫 Blocked</option>
    </select>
    <select id="filterAccess" onchange="filterTable()">
      <option value="">All Access</option>
      <option value="Self-Serve">Self-Serve</option>
      <option value="Freemium">Freemium</option>
      <option value="Gated">Gated</option>
    </select>
    <select id="filterMCP" onchange="filterTable()">
      <option value="">All MCP</option>
      <option value="Official">Official</option>
      <option value="Community">Community</option>
      <option value="In-Progress">In-Progress</option>
      <option value="None">None</option>
    </select>
    <button class="btn-reset" onclick="resetFilters()">Reset</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="cursor:pointer;" onclick="sortTable('app_name')">App ↕</th>
          <th class="hide-sm">Category</th>
          <th>Auth</th>
          <th class="hide-md">API</th>
          <th style="cursor:pointer;" onclick="sortTable('buildability_verdict')">Verdict ↕</th>
          <th style="cursor:pointer;" onclick="sortTable('confidence_score')">Conf ↕</th>
          <th class="hide-lg">MCP</th>
          <th>Access</th>
        </tr>
      </thead>
      <tbody id="appTableBody"></tbody>
    </table>
  </div>
  <div id="noResults" style="display:none;" class="no-results">
    <div style="font-size:2.5rem;margin-bottom:.75rem;">🔍</div>
    <div>No apps match your filters.</div>
    <button onclick="resetFilters()" style="margin-top:.75rem;font-size:.8rem;color:#6366f1;background:none;border:none;cursor:pointer;">Clear filters</button>
  </div>
</section>
